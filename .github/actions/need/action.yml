name: 'My Composite Action'
description: 'Combines multiple steps'
runs:
  using: "composite"
  steps:
    - name: 下载源码后进行源码微调和增加插件源
      shell: bash
      run: |
        cd $HOME_PATH
        bash $COMMON_SH Diy_menu

    - name: 运行自定义文件
      shell: bash
      run: |
        cd $HOME_PATH
        bash $COMMON_SH Diy_menu2

    - name: 自定义后检测主题是否可设置系统默认主题
      shell: bash
      run: |
        cd $HOME_PATH
        bash $COMMON_SH Diy_menu3

    - name: SSH远程连接文字提示
      if: env.SSH_ACTION == 'true'
      shell: bash
      run: |
        cd $HOME_PATH
        echo -e "\n\033[33m正在执行：远程make menuconfig\033[0m"

    - name: SSH远程连接（make menuconfig）
      if: env.SSH_ACTION == 'true'
      uses: datout/debugger-action@main

    - name: 生成配置文件和提取机型
      shell: bash
      run: |
        cd $HOME_PATH
        bash $COMMON_SH Diy_menu4

    - name: 清理所有缓存
      continue-on-error: true
      if: env.CLEAR_CACHEWRTBUILD == 'true'
      shell: bash
      run: |
        echo
        echo -e "\033[33m正在执行：清理缓存\033[0m"
        CACHES=$(curl -s -H "Authorization: token $REPO_TOKEN" \
           "https://api.github.com/repos/$GIT_REPOSITORY/actions/caches?per_page=100" \
           | jq -r --arg regex ".*-cache-openwr" '.actions_caches[] | select(.key | test($regex)) | "\(.id) \(.key)"')
        if [ -n "$CACHES" ]; then
           echo "$CACHES" | while read -r cache_id cache_key; do
             curl -X DELETE -s -H "Authorization: token $REPO_TOKEN" \
                "https://api.github.com/repos/$GIT_REPOSITORY/actions/caches/$cache_id"
             echo -e "\033[32m已清理缓存名称: $cache_key (ID: $cache_id)\033[0m"
           done
        else
           echo -e "\033[36m没有缓存,无需清理\033[0m"
        fi
        echo

    - name: 机型为armsr_rootfs_tar_gz的时,改变是远程更新为打包设置
      shell: bash
      run: |
        cd $HOME_PATH
        if [[ "${TARGET_BOARD}" =~ (armvirt|armsr) ]]; then
           echo "PACKAGING_FIRMWARE=${UPDATE_FIRMWARE_ONLINE}" >> ${GITHUB_ENV}
           echo "UPDATE_FIRMWARE_ONLINE=false" >> ${GITHUB_ENV}
           echo "ONLINE_FIRMWARE=true" >> ${GITHUB_ENV}
        fi

    - name: 远程更新,如果UPDATE_FIRMWARE_ONLINE == 'true'则运行
      if: env.UPDATE_FIRMWARE_ONLINE == 'true'
      shell: bash
      run: |
        cd $HOME_PATH
        source ${UPGRADE_SH} && Diy_Part2
  
    - name: 判断插件有否冲突减少编译错误
      shell: bash
      run: |
        cd $HOME_PATH
        bash $COMMON_SH Diy_menu5
        if [ -s "${CONFIG_TXT}" ]; then
          OPERATE_SEED="${MYCONFIG_FILE}"
          REPO_SEED="${GITHUB_WORKSPACE}/build/${FOLDER_NAME}/seed/${CONFIG_FILE}"
          mkdir -p "$(dirname "${OPERATE_SEED}")" "$(dirname "${REPO_SEED}")"
          cp -f "${CONFIG_TXT}" "${OPERATE_SEED}"
          cp -f "${CONFIG_TXT}" "${REPO_SEED}"
          echo "SYNCED_FINAL_SEED=${OPERATE_SEED}" >> ${GITHUB_ENV}
          echo "REPO_SEED=${REPO_SEED}" >> ${GITHUB_ENV}
          echo -e "\033[32m已同步最终配置到两个 seed：\033[0m"
          echo "operates: ${OPERATE_SEED}"
          echo "workspace: ${REPO_SEED}"
        else
          echo -e "\033[31mCONFIG_TXT 不存在或为空：${CONFIG_TXT}\033[0m"
          exit 1
        fi
        echo "CONFIG_DATE=$(date +%Y-%m%d-%H%M)" >> ${GITHUB_ENV}
        echo "SendMessage=true" >> ${GITHUB_ENV}

    - name: 输出本次最终保存到 seed 的配置摘要
      shell: bash
      run: |
        echo
        OPERATE_SEED="${MYCONFIG_FILE}"
        REPO_SEED="${GITHUB_WORKSPACE}/build/${FOLDER_NAME}/seed/${CONFIG_FILE}"
        echo -e "\033[33moperates seed：${OPERATE_SEED}\033[0m"
        echo -e "\033[33mrepo seed：${REPO_SEED}\033[0m"
        for seed in "${OPERATE_SEED}" "${REPO_SEED}"; do
          if [ -f "${seed}" ]; then
            echo -e "\033[32m$(basename "${seed}") 关键项：\033[0m"
            grep -E 'CONFIG_PACKAGE_(luci-app-passwall|luci-app-ssr-plus|nikki|luci-app-nikki|mihomo-meta|mihomo-alpha)=' "${seed}" || true
          else
            echo -e "\033[31mseed 未找到：${seed}\033[0m"
            exit 1
          fi
        done
        if [ -f "${COMPILE_PATH}/relevance/${CONFIG_FILE}.full.config" ]; then
          echo -e "\033[32m已保存完整 .config：${COMPILE_PATH}/relevance/${CONFIG_FILE}.full.config\033[0m"
        fi

    - name: 上传配置文件在 Github Artifacts
      if: env.SHANG_CHUAN == 'true'
      shell: bash
      run: |
        cd $HOME_PATH
        echo -e "\n\033[33m上传.config配置文件至Github Artifacts\033[0m"

    - name: 上传配置文件在 Github Artifacts
      if: env.SHANG_CHUAN == 'true'
      uses: actions/upload-artifact@main
      with:
        name: .config_${{ env.SOURCE }}_${{ env.LUCI_EDITION }}_${{ env.TARGET_PROFILE }}_${{ env.CONFIG_DATE }}
        path: |
          ${{ env.CONFIG_TXT }}
          ${{ env.COMPILE_PATH }}/relevance/${{ env.CONFIG_FILE }}.full.config
branding:
  icon: "terminal"
  color: "gray-dark"
